interface:
  display_name: "Sync HTML Bookmarks to Markdown"
  short_description: "Turn bookmark HTML exports into incremental Markdown with compact indexes, preserved categories, and pending-description tracking"
  default_prompt: "Use $html-bookmarks-to-markdown to sync a bookmark-style HTML export into a Markdown archive. Before running, collect inputs in a short one-question-at-a-time flow instead of requiring a single structured reply. Ask for the HTML path first, then the archive location, and explain the available options for layout (compact or per-url), mode (merge or create), and title language (zh or en) while making it clear that compact, merge, and zh are the defaults. If the user gives the final archive folder path, normalize it into target-root plus container-name and confirm that interpretation before running. If the user is updating or merging into an existing bookmark archive, inspect that archive first and treat its current language, naming, category structure, and archive organization as the source of truth. In merge flows, preserve the user's current repository conventions instead of inferring a new taxonomy unless the user explicitly asks for a structural rewrite. Keep sync state outside the rendered archive by default for compact layout, preserve the HTML category structure, keep domain indexes lightweight, apply the default noise filters, and preserve existing descriptions during merge runs."
