interface:
  display_name: "Sync HTML Bookmarks to Markdown"
  short_description: "Turn bookmark HTML exports into incremental Markdown with compact indexes, preserved categories, and pending-description tracking"
  default_prompt: "Use $html-bookmarks-to-markdown to sync a bookmark-style HTML export into a Markdown archive. First confirm the target root path the user wants to use, supporting either an absolute path or a relative path. Use the compact layout by default so the output stays Obsidian-friendly, keep sync state outside the rendered archive, and only switch to per-url if the user explicitly wants one note per URL. If the archive lives inside an Obsidian vault under Documents, default the external state root to a sibling folder under Documents rather than placing it inside the vault. Make index files outline-friendly in Obsidian by rendering each web entry as a heading block rather than a plain bullet list. Keep domain indexes lightweight, apply the default noise filters for browser-internal pages and bookmark separators, record them in Excluded Links.md, preserve the HTML category structure, detect newly added URLs versus prior syncs, and keep existing descriptions. For large archives, annotate gradually by category branch unless the user explicitly asks for everything to be filled at once, in which case use the bulk autofill helper to generate first-pass descriptions for all remaining pending URLs."
